.dia{font-size:34px;margin-bottom:12px}
p{line-height:1.95;margin:0 0 24px;font-weight:300}
a{display:inline-block;background:linear-gradient(135deg,#F2CD88,#D9AE5F);color:#060B16;text-decoration:none;padding:12px 28px;border-radius:10px;font-weight:700;box-shadow:0 10px 30px rgba(217,174,95,.3)}

</head>

<div class="box">
<div class="dia">🪔</div>
